<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Chat Elegante</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold-light: #f5d87a;
    --gold: #c9a84c;
    --gold-dark: #8a6820;
    --black: #0a0a0a;
    --black-mid: #141414;
    --black-soft: #1c1c1c;
    --black-card: #252420;
    --gray-dark: #2a2a2a;
    --text-light: #f0e6c8;
    --text-muted: #9a8a6a;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--black);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .app {
    position: fixed; inset: 0;
    display: flex; justify-content: center; align-items: center;
    z-index: 1;
  }

  .chat-window {
    width: min(420px, 100vw);
    height: 100%;
    max-height: 100dvh;
    background: var(--black-mid);
    display: flex; flex-direction: column;
    border-left:  1px solid rgba(201,168,76,0.15);
    border-right: 1px solid rgba(201,168,76,0.15);
    overflow: hidden;
    box-shadow: 0 0 80px rgba(0,0,0,0.9);
  }

  .header {
    flex-shrink: 0;
    padding: 14px 18px;
    background: var(--black-soft);
    display: flex; align-items: center; gap: 12px;
    position: relative;
  }
  .header::after {
    content: ''; position: absolute;
    bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.35;
  }

  .back-btn {
    background: none; border: none;
    color: var(--gold); font-size: 22px;
    cursor: pointer; opacity: 0.8; line-height: 1; padding: 2px 4px;
  }

  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600; color: var(--black);
    border: 1.5px solid rgba(201,168,76,0.45);
    flex-shrink: 0; position: relative;
  }
  .avatar::after {
    content: ''; position: absolute;
    bottom: 1px; right: 1px;
    width: 10px; height: 10px;
    background: #4caf7d; border-radius: 50%;
    border: 2px solid var(--black-soft);
  }

  .contact-info { flex: 1; min-width: 0; }
  .contact-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-weight: 600;
    color: var(--gold-light); letter-spacing: 0.03em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .contact-status {
    font-size: 10px; color: var(--gold);
    letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0.7; margin-top: 2px;
  }

  .header-actions { display: flex; gap: 14px; flex-shrink: 0; }
  .header-actions button {
    background: none; border: none; color: var(--gold);
    opacity: 0.7; cursor: pointer;
    display: flex; align-items: center;
    transition: opacity 0.2s;
  }
  .header-actions button:hover { opacity: 1; }

  .messages {
    flex: 1;
    overflow-y: auto; overflow-x: hidden;
    padding: 18px 14px 12px;
    display: flex; flex-direction: column; gap: 5px;
    background: var(--black-mid);
    background-image:
      radial-gradient(ellipse at 15% 85%, rgba(201,168,76,0.04) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 15%, rgba(201,168,76,0.03) 0%, transparent 55%);
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.18); border-radius: 2px; }

  .date-sep { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
  .date-sep::before, .date-sep::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.18), transparent);
  }
  .date-sep span {
    font-size: 10px; color: var(--text-muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .msg-row { display: flex; animation: fadeIn 0.22s ease; }
  .msg-row.sent { justify-content: flex-end; }
  .msg-row.recv { justify-content: flex-start; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble {
    max-width: 74%; padding: 9px 13px; border-radius: 18px;
    font-size: 13.5px; line-height: 1.55;
    word-break: break-word; white-space: pre-wrap;
  }
  .msg-row.sent .bubble {
    background: linear-gradient(135deg, #c9a84c, #8a6820);
    color: #0a0a0a; border-bottom-right-radius: 4px;
    box-shadow: 0 2px 10px rgba(201,168,76,0.22); font-weight: 400;
  }
  .msg-row.recv .bubble {
    background: var(--black-card); color: var(--text-light);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(201,168,76,0.1);
  }

  .bubble .time {
    font-size: 9.5px; margin-top: 4px;
    display: flex; align-items: center; gap: 3px;
    justify-content: flex-end; letter-spacing: 0.02em;
  }
  .msg-row.sent .bubble .time { color: rgba(10,10,10,0.5); }
  .msg-row.recv .bubble .time { color: var(--text-muted); }
  .check { font-size: 11px; }
  .check.read { color: var(--gold-dark); }

  .typing-row { display: none; }
  .typing-row.show { display: flex; }
  .typing-bubble {
    display: flex; align-items: center; gap: 5px;
    padding: 10px 16px;
    background: var(--black-card);
    border-radius: 18px; border-bottom-left-radius: 4px;
    border: 1px solid rgba(201,168,76,0.1);
  }
  .dot {
    width: 6px; height: 6px; background: var(--gold);
    border-radius: 50%; animation: bounce 1.2s infinite; opacity: 0.5;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.35; }
    30%          { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    flex-shrink: 0;
    padding: 10px 12px;
    background: var(--black-soft);
    display: flex; align-items: flex-end; gap: 10px;
    position: relative;
  }
  .input-area::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.28), transparent);
  }

  .input-wrap {
    flex: 1;
    background: var(--gray-dark);
    border-radius: 22px;
    border: 1px solid rgba(201,168,76,0.14);
    display: flex; align-items: flex-end;
    padding: 9px 14px; gap: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap:focus-within {
    border-color: rgba(201,168,76,0.38);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.06);
  }

  #msg-input {
    flex: 1;
    background: transparent; border: none; outline: none;
    color: var(--text-light);
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 300;
    resize: none; max-height: 110px;
    line-height: 1.5; letter-spacing: 0.01em;
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  #msg-input::placeholder { color: var(--text-muted); }

  .clip-btn {
    background: none; border: none; color: var(--gold);
    opacity: 0.55; cursor: pointer;
    display: flex; align-items: center; flex-shrink: 0;
    padding: 2px; transition: opacity 0.2s;
  }
  .clip-btn:hover { opacity: 0.85; }

  .send-btn {
    width: 46px; height: 46px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.18s, box-shadow 0.18s;
    box-shadow: 0 2px 14px rgba(201,168,76,0.32);
  }
  .send-btn:hover  { transform: scale(1.07); box-shadow: 0 4px 22px rgba(201,168,76,0.48); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 20px; height: 20px; fill: var(--black); transform: translateX(1px); }
</style>
</head>
<body>

<div class="app">
  <div class="chat-window">

    <div class="header">
      <button class="back-btn">&#8249;</button>
      <div class="avatar">S</div>
      <div class="contact-info">
        <div class="contact-name">Sophia Laurent</div>
        <div class="contact-status">En línea</div>
      </div>
      <div class="header-actions">
        <button title="Videollamada">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="23 7 16 12 23 17 23 7"/>
            <rect x="1" y="5" width="15" height="14" rx="2"/>
          </svg>
        </button>
        <button title="Llamada">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </button>
        <button title="Más">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="date-sep"><span>Hoy</span></div>

      <div class="msg-row recv">
        <div class="bubble">Buenas tardes, ¿cómo estás?<div class="time">14:02</div></div>
      </div>
      <div class="msg-row sent">
        <div class="bubble">¡Todo excelente! Acabo de terminar la reunión.<div class="time">14:05 <span class="check read">✓✓</span></div></div>
      </div>
      <div class="msg-row recv">
        <div class="bubble">Me alegra mucho escucharlo.<div class="time">14:07</div></div>
      </div>
      <div class="msg-row sent">
        <div class="bubble">¿Quedamos esta noche para celebrar?<div class="time">14:08 <span class="check read">✓✓</span></div></div>
      </div>
      <div class="msg-row recv">
        <div class="bubble">Me parece perfecto. ¿A las 8?<div class="time">14:10</div></div>
      </div>
      <div class="msg-row sent">
        <div class="bubble">¡Trato hecho!<div class="time">14:11 <span class="check read">✓✓</span></div></div>
      </div>

      <div class="msg-row recv typing-row" id="typingRow">
        <div class="typing-bubble">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="msg-input"
          rows="1"
          placeholder="Mensaje..."
          autocomplete="off"
          autocorrect="on"
          spellcheck="true"
          enterkeyhint="send"
        ></textarea>
        <button class="clip-btn" title="Adjuntar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
      </div>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>

  </div>
</div>

<script>
  const input     = document.getElementById('msg-input');
  const sendBtn   = document.getElementById('sendBtn');
  const messages  = document.getElementById('messages');
  const typingRow = document.getElementById('typingRow');

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 110) + 'px';
  }
  input.addEventListener('input', autoResize);

  function scrollBottom() { messages.scrollTop = messages.scrollHeight; }

  function getTime() {
    const d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function addBubble(text, side, check) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + side;
    const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const chk  = check ? ' <span class="check read">✓✓</span>' : '';
    row.innerHTML = `<div class="bubble">${safe}<div class="time">${getTime()}${chk}</div></div>`;
    messages.insertBefore(row, typingRow);
    scrollBottom();
  }

  function send() {
    const text = input.value.trim();
    if (!text) return;
    addBubble(text, 'sent', true);
    input.value = '';
    input.style.height = 'auto';
    input.focus();

    setTimeout(() => { typingRow.classList.add('show'); scrollBottom(); }, 700);

    const replies = [
      'Entendido, perfecto.',
      'Claro, con gusto.',
      'De acuerdo, nos vemos.',
      'Excelente, gracias.',
      'Muy bien, lo tengo en cuenta.',
      'Perfecto, sin problema.',
    ];
    setTimeout(() => {
      typingRow.classList.remove('show');
      addBubble(replies[Math.floor(Math.random() * replies.length)], 'recv', false);
    }, 2100);
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  scrollBottom();
</script>
</body>
</html>
