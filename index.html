<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Prototipo</title>
<style>
  :root {
    --green: #25D366;
    --green-dark: #128C7E;
    --gray-light: #ece5dd;
    --gray-dark: #dcf8c6;
    --bg: #f0f0f0;
    --text: #000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .chat-window {
    width: 100%;
    max-width: 420px;
    height: 90vh;
    background: #fff;
    display: flex;
    flex-direction: column;
    border: 1px solid #ccc;
    border-radius: 8px;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--gray-light);
  }

  .msg {
    max-width: 70%;
    padding: 8px 12px;
    border-radius: 16px;
    word-break: break-word;
    font-size: 14px;
  }

  .sent { background: var(--green-dark); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .recv { background: var(--gray-dark); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }

  .input-area {
    display: flex;
    padding: 8px;
    border-top: 1px solid #ccc;
    gap: 6px;
    background: #fff;
  }

  #msg-input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 20px;
    font-size: 14px;
    outline: none;
  }

  #send-btn {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 18px;
  }

  /* Scroll suave */
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: #bbb; border-radius: 2px; }

</style>
</head>
<body>

<div class="chat-window">
  <div class="messages" id="messages">
    <!-- Mensajes se agregarán aquí -->
  </div>
  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Escribe un mensaje..." />
    <button id="send-btn">➤</button>
  </div>
</div>

<script>
  const input = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const messages = document.getElementById('messages');

  function scrollBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  function sendMessage() {
    const text = input.value.trim();
    if(!text) return;
    
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg sent';
    msgDiv.textContent = text;
    
    messages.appendChild(msgDiv);
    input.value = '';
    scrollBottom();
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
