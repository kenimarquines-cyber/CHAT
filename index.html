<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macarena Bar — Live Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
  :root {
    --neon-cyan:   #46d2da;
    --neon-purple: #bc13fe;
    --neon-pink:   #ff00ff;
    --glass:       rgba(5, 5, 5, 0.85);
    --border:      rgba(70, 210, 218, 0.3);
    --text:        #ffffff;
    --text-muted:  #aaaaaa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background-color: #000;
  }

  /* FONDO PANTALLA COMPLETA */
  .bg {
    position: fixed;
    inset: 0;
    background: url('fondo_chat.jpg') center/cover no-repeat;
    z-index: 0;
  }

  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.4); /* Oscurece un poco para leer mejor */
  }

  /* PANTALLA DE ACCESO FULL SCREEN */
  .access-screen {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(5px);
  }

  .access-card {
    background: var(--glass);
    border: 2px solid var(--neon-cyan);
    border-radius: 24px;
    padding: 40px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 30px rgba(70, 210, 218, 0.2);
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    letter-spacing: 5px;
    color: var(--neon-cyan);
    text-transform: uppercase;
    text-shadow: 0 0 10px var(--neon-cyan);
  }

  .field-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--neon-purple);
    text-transform: uppercase;
    text-align: left;
    margin-top: 15px;
    margin-bottom: 5px;
  }

  .access-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: white;
    outline: none;
    font-size: 1rem;
  }

  .access-input:focus { border-color: var(--neon-pink); }

  .role-select { display: flex; gap: 10px; margin-top: 10px; }

  .role-btn {
    flex: 1; padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    cursor: pointer;
    text-transform: uppercase;
  }

  .role-btn.active {
    border-color: var(--neon-purple);
    color: white;
    box-shadow: 0 0 10px var(--neon-purple);
  }

  .enter-btn {
    width: 100%;
    margin-top: 25px;
    padding: 15px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
  }

  /* VENTANA DE CHAT FULL SCREEN */
  .chat-wrap {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    flex-direction: column;
    background: var(--glass);
  }

  .chat-wrap.visible { display: flex; }

  .chat-header {
    padding: 20px;
    background: rgba(0,0,0,0.6);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .avatar {
    width: 45px; height: 45px;
    border-radius: 50%;
    border: 2px solid var(--neon-purple);
    display: flex; align-items: center; justify-content: center;
    color: var(--neon-purple);
    font-weight: bold;
  }

  .messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  /* Burbujas Neón */
  .msg-row { max-width: 80%; display: flex; flex-direction: column; }
  .msg-row.sent { align-self: flex-end; }
  .msg-row.recv { align-self: flex-start; }

  .msg-bubble {
    padding: 12px 18px;
    border-radius: 18px;
    font-size: 0.95rem;
    color: white;
    position: relative;
  }

  .sent .msg-bubble {
    background: rgba(188, 19, 254, 0.2);
    border: 1px solid var(--neon-purple);
    border-bottom-right-radius: 2px;
  }

  .recv .msg-bubble {
    background: rgba(70, 210, 218, 0.2);
    border: 1px solid var(--neon-cyan);
    border-bottom-left-radius: 2px;
  }

  .input-area {
    padding: 20px;
    display: flex;
    gap: 10px;
    background: rgba(0,0,0,0.5);
    border-top: 1px solid var(--border);
  }

  #msg-input {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--border);
    padding: 15px;
    border-radius: 12px;
    color: white;
    outline: none;
  }

  #send-btn {
    width: 55px;
    background: var(--neon-cyan);
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }

  .my-id-tag {
    font-size: 0.8rem;
    color: var(--neon-cyan);
    margin-bottom: 10px;
  }

</style>
</head>
<body>

<div class="bg"></div>

<div class="access-screen" id="access-screen">
  <div class="access-card">
    <div class="brand">MACARENA</div>
    <div style="color: #666; font-size: 0.8rem; margin-bottom: 20px;">LIVE CONNECT</div>
    
    <div class="my-id-tag" id="display-my-id">Generando tu ID...</div>

    <div class="field-label">ID del otro usuario (compañero)</div>
    <input class="access-input" id="other-id" type="text" placeholder="Pega el ID aquí..." />

    <div class="field-label">Entrar como</div>
    <div class="role-select">
      <button class="role-btn active" id="role-client" onclick="selectRole('cliente')">Cliente</button>
      <button class="role-btn" id="role-vendor" onclick="selectRole('vendedor')">Vendedor</button>
    </div>

    <button class="enter-btn" onclick="connectToPeer()">CONECTAR AL CHAT</button>
  </div>
</div>

<div class="chat-wrap" id="chat-wrap">
  <div class="chat-header">
    <div class="avatar" id="status-avatar">!!</div>
    <div class="header-info">
      <div id="chat-title" style="color:white; font-weight: bold;">Esperando conexión...</div>
      <div id="chat-status" style="color:var(--neon-cyan); font-size: 0.7rem;">ONLINE</div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Escribe un mensaje VIP..." />
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="black"/></svg>
    </button>
  </div>
</div>

<script>
  let peer;
  let conn;
  let myRole = 'cliente';
  let myId = '';

  // 1. Inicializar PeerJS (Esto genera un ID único para tu navegador)
  peer = new Peer();

  peer.on('open', (id) => {
    myId = id;
    document.getElementById('display-my-id').innerText = "Tu ID: " + id;
    console.log('Mi ID es: ' + id);
  });

  // 2. Escuchar cuando alguien se conecta a TI
  peer.on('connection', (c) => {
    conn = c;
    setupChat();
  });

  function selectRole(role) {
    myRole = role;
    document.getElementById('role-client').classList.toggle('active', role === 'cliente');
    document.getElementById('role-vendor').classList.toggle('active', role === 'vendedor');
  }

  // 3. Conectar al compañero
  function connectToPeer() {
    const otherId = document.getElementById('other-id').value.trim();
    if (!otherId) return alert("Pega el ID de tu compañero");

    conn = peer.connect(otherId);
    setupChat();
  }

  function setupChat() {
    // Cambiar vista
    document.getElementById('access-screen').style.display = 'none';
    document.getElementById('chat-wrap').style.display = 'flex';
    document.getElementById('chat-title').innerText = myRole === 'cliente' ? "Hablando con Vendedor" : "Hablando con Cliente";

    // Escuchar mensajes
    conn.on('data', (data) => {
      renderMsg(data, 'recv');
    });

    conn.on('open', () => {
      console.log("Conectado con éxito");
    });
  }

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !conn) return;

    const msgData = {
      text: text,
      role: myRole,
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    };

    conn.send(msgData); // Enviamos por la red
    renderMsg(msgData, 'sent'); // Lo pintamos en nuestra pantalla
    input.value = '';
  }

  function renderMsg(data, type) {
    const container = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `msg-row ${type}`;

    row.innerHTML = `
      <div style="font-size:0.6rem; color:var(--neon-purple); margin-bottom:2px; text-transform:uppercase; letter-spacing:1px;">
        ${type === 'sent' ? 'Tú' : data.role}
      </div>
      <div class="msg-bubble">${data.text}</div>
      <div style="font-size:0.5rem; color:#666; margin-top:2px; text-align:${type==='sent'?'right':'left'}">${data.time}</div>
    `;

    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  // Enviar con Enter
  document.getElementById('msg-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>

</body>
</html>
