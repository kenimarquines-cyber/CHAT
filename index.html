<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Elegante</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold-light: #f5d87a;
    --gold: #c9a84c;
    --gold-dark: #8a6820;
    --gold-shine: #ffe8a3;
    --black: #0a0a0a;
    --black-mid: #141414;
    --black-soft: #1c1c1c;
    --black-card: #1f1e1e;
    --gray-dark: #2a2a2a;
    --gray-mid: #3a3933;
    --text-light: #f0e6c8;
    --text-muted: #9a8a6a;
    --bubble-sent: linear-gradient(135deg, #c9a84c, #8a6820);
    --bubble-recv: #252420;
    --shadow-gold: 0 4px 24px rgba(201,168,76,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .app {
    width: 420px;
    height: 92vh;
    max-height: 860px;
    background: var(--black-mid);
    border-radius: 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(201,168,76,0.2);
    box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(201,168,76,0.08), inset 0 1px 0 rgba(201,168,76,0.12);
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    padding: 14px 18px;
    background: var(--black-soft);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.4;
  }

  .back-btn {
    color: var(--gold);
    font-size: 20px;
    cursor: pointer;
    opacity: 0.8;
    transition: opacity 0.2s;
    background: none; border: none;
    display: flex; align-items: center;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--black);
    font-weight: 600;
    border: 1.5px solid rgba(201,168,76,0.5);
    flex-shrink: 0;
    position: relative;
  }

  .avatar::after {
    content: '';
    position: absolute;
    bottom: 1px; right: 1px;
    width: 10px; height: 10px;
    background: #4caf7d;
    border-radius: 50%;
    border: 2px solid var(--black-soft);
  }

  .contact-info { flex: 1; }

  .contact-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.03em;
    line-height: 1.2;
  }

  .contact-status {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-top: 2px;
  }

  .header-actions {
    display: flex;
    gap: 14px;
    color: var(--gold);
    opacity: 0.75;
  }

  .header-actions button {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 17px;
    cursor: pointer;
    opacity: 0.8;
    transition: opacity 0.2s;
  }

  .header-actions button:hover { opacity: 1; }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--black-mid);
    background-image:
      radial-gradient(ellipse at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.03) 0%, transparent 60%);
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 2px; }

  /* Date separator */
  .date-sep {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 10px 0;
  }

  .date-sep::before, .date-sep::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
  }

  .date-sep span {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Bubbles */
  .msg-row {
    display: flex;
    margin-bottom: 2px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.sent { justify-content: flex-end; }
  .msg-row.recv { justify-content: flex-start; }

  .bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 18px;
    position: relative;
    font-size: 13.5px;
    line-height: 1.55;
    word-break: break-word;
  }

  .msg-row.sent .bubble {
    background: var(--bubble-sent);
    color: #0a0a0a;
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 12px rgba(201,168,76,0.25);
    font-weight: 400;
  }

  .msg-row.recv .bubble {
    background: var(--bubble-recv);
    color: var(--text-light);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(201,168,76,0.1);
  }

  .bubble .time {
    font-size: 9.5px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 3px;
    justify-content: flex-end;
    letter-spacing: 0.02em;
  }

  .msg-row.sent .bubble .time { color: rgba(10,10,10,0.55); }
  .msg-row.recv .bubble .time { color: var(--text-muted); }

  .check { font-size: 11px; }
  .check.read { color: var(--gold); }

  /* Emoji-only bubbles */
  .bubble.emoji-only {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    font-size: 36px;
    padding: 4px 8px;
    line-height: 1.2;
  }

  .bubble.emoji-only .time {
    font-size: 9.5px;
    color: var(--text-muted);
  }

  /* Input area */
  .input-area {
    padding: 12px 14px;
    background: var(--black-soft);
    border-top: 1px solid rgba(201,168,76,0.12);
    display: flex;
    align-items: flex-end;
    gap: 10px;
    position: relative;
  }

  .input-area::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 20px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s, transform 0.2s;
    flex-shrink: 0;
    padding: 4px;
    display: flex;
    align-items: center;
  }

  .icon-btn:hover { opacity: 1; transform: scale(1.1); }

  .input-wrap {
    flex: 1;
    background: var(--gray-dark);
    border-radius: 22px;
    border: 1px solid rgba(201,168,76,0.15);
    display: flex;
    align-items: flex-end;
    padding: 8px 14px;
    transition: border-color 0.2s;
    gap: 8px;
  }

  .input-wrap:focus-within {
    border-color: rgba(201,168,76,0.4);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.06);
  }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-light);
    font-family: 'Montserrat', sans-serif;
    font-size: 13.5px;
    font-weight: 300;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
    letter-spacing: 0.01em;
  }

  #msg-input::placeholder { color: var(--text-muted); font-weight: 300; }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(201,168,76,0.35);
  }

  .send-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 4px 20px rgba(201,168,76,0.5);
  }

  .send-btn:active { transform: scale(0.96); }

  .send-btn svg {
    width: 20px;
    height: 20px;
    fill: var(--black);
    transform: translateX(1px);
  }

  /* Emoji picker */
  .emoji-picker {
    position: absolute;
    bottom: 72px;
    left: 14px;
    background: var(--black-card);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 18px;
    padding: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.05);
    display: none;
    flex-direction: column;
    gap: 10px;
    z-index: 100;
    animation: slideUp 0.2s ease;
    width: 300px;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .emoji-picker.visible { display: flex; }

  .emoji-categories {
    display: flex;
    gap: 6px;
    border-bottom: 1px solid rgba(201,168,76,0.12);
    padding-bottom: 10px;
  }

  .cat-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 8px;
    transition: background 0.15s;
    opacity: 0.65;
  }

  .cat-btn:hover, .cat-btn.active {
    background: rgba(201,168,76,0.12);
    opacity: 1;
  }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    max-height: 160px;
    overflow-y: auto;
  }

  .emoji-grid::-webkit-scrollbar { width: 3px; }
  .emoji-grid::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 2px; }

  .e-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 5px;
    border-radius: 8px;
    transition: background 0.15s, transform 0.1s;
    line-height: 1;
  }

  .e-btn:hover {
    background: rgba(201,168,76,0.12);
    transform: scale(1.2);
  }

  /* Typing indicator */
  .typing-bubble {
    display: none;
    align-items: center;
    gap: 5px;
    padding: 10px 16px;
    background: var(--bubble-recv);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(201,168,76,0.1);
    width: fit-content;
  }

  .typing-bubble.show { display: flex; }

  .dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <button class="back-btn">‹</button>
    <div class="avatar">S</div>
    <div class="contact-info">
      <div class="contact-name">Sophia Laurent</div>
      <div class="contact-status">En línea</div>
    </div>
    <div class="header-actions">
      <button title="Videollamada">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      </button>
      <button title="Llamada">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
      <button title="Más opciones">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="date-sep"><span>Hoy</span></div>

    <div class="msg-row recv">
      <div class="bubble">
        Buenas tardes ✨ ¿Cómo estás?
        <div class="time">14:02</div>
      </div>
    </div>

    <div class="msg-row sent">
      <div class="bubble">
        ¡Todo excelente! Acabo de terminar la reunión 🎉
        <div class="time">14:05 <span class="check read">✓✓</span></div>
      </div>
    </div>

    <div class="msg-row recv">
      <div class="bubble emoji-only">
        🥂
        <div class="time">14:06</div>
      </div>
    </div>

    <div class="msg-row sent">
      <div class="bubble">
        ¿Quedamos esta noche para celebrar?
        <div class="time">14:07 <span class="check read">✓✓</span></div>
      </div>
    </div>

    <div class="msg-row recv">
      <div class="bubble">
        Me parece perfecto 😍 ¿A las 8?
        <div class="time">14:09</div>
      </div>
    </div>

    <div class="msg-row sent">
      <div class="bubble">
        ¡Trato hecho! 🖤✨
        <div class="time">14:10 <span class="check read">✓✓</span></div>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="msg-row recv" id="typing-row" style="display:none;">
      <div class="typing-bubble show">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <!-- Emoji Picker -->
  <div class="emoji-picker" id="emojiPicker">
    <div class="emoji-categories" id="emojiCats"></div>
    <div class="emoji-grid" id="emojiGrid"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <button class="icon-btn" id="emojiToggle" title="Emojis">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
    </button>

    <div class="input-wrap">
      <textarea id="msg-input" rows="1" placeholder="Mensaje..."></textarea>
      <button class="icon-btn" title="Adjuntar" style="font-size:17px;opacity:0.55;padding:2px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
    </div>

    <button class="send-btn" id="sendBtn" title="Enviar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const emojis = {
  '😊': ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱'],
  '❤️': ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝','💟','♾️','✨','🔥','💥','💫','⭐','🌟','🌈','🎯','🏆','👑','💎','🌙'],
  '👋': ['👋','🤚','🖐','✋','🖖','👌','🤌','🤏','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','🖕','👇','☝️','👍','👎','✊','👊','🤛','🤜','👏','🙌','🫶','🤲','🤝','🙏'],
  '🐶': ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🐤','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🦋','🐌','🐛','🐞'],
  '🍕': ['🍕','🍔','🌮','🌯','🥗','🍜','🍣','🍱','🥟','🍤','🍙','🍘','🍥','🥮','🍡','🧁','🍰','🎂','🍮','🍭','🍬','🍫','🍿','🍩','🍪','🌰','🥜','🍯','🫖','☕','🍵','🧃','🥤','🍺','🥂','🍾'],
  '⚽': ['⚽','🏀','🏈','⚾','🎾','🏐','🏉','🎱','🏓','🏸','🥊','🥋','🏒','🏑','🏏','🎿','⛷️','🏂','🪂','🏋️','🤸','🤼','🏊','🚴','🏄','🤽','🧗','🏇','🏌️','🤺','🤿'],
  '🎵': ['🎵','🎶','🎼','🎹','🥁','🪘','🎸','🎺','🎻','🪕','🪗','🎷','🎤','🎧','📻','🎙️','🎚️','🎛️','📺','📷','📸','🎥','🎬','🎮','🕹️','🎲','♟️','🎯','🎳','🎪','🎭','🎨'],
};

const catIcons = {'😊':'😊','❤️':'❤️','👋':'👋','🐶':'🐾','🍕':'🍕','⚽':'⚽','🎵':'🎵'};

const picker = document.getElementById('emojiPicker');
const grid = document.getElementById('emojiGrid');
const cats = document.getElementById('emojiCats');
const input = document.getElementById('msg-input');
const messages = document.getElementById('messages');
const sendBtn = document.getElementById('sendBtn');
const typingRow = document.getElementById('typing-row');

let currentCat = '😊';

// Build category buttons
Object.keys(emojis).forEach((cat, i) => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
  btn.textContent = catIcons[cat] || cat.charAt(0);
  btn.onclick = () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat;
    renderEmojis(cat);
  };
  cats.appendChild(btn);
});

function renderEmojis(cat) {
  grid.innerHTML = '';
  emojis[cat].forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'e-btn';
    btn.textContent = e;
    btn.onclick = () => {
      input.value += e;
      input.focus();
      autoResize();
    };
    grid.appendChild(btn);
  });
}

renderEmojis(currentCat);

// Toggle picker
document.getElementById('emojiToggle').onclick = (ev) => {
  ev.stopPropagation();
  picker.classList.toggle('visible');
};

document.addEventListener('click', (e) => {
  if (!picker.contains(e.target) && e.target.id !== 'emojiToggle') {
    picker.classList.remove('visible');
  }
});

// Auto resize textarea
function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
}
input.addEventListener('input', autoResize);

// Send message
function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  const isOnlyEmoji = /^[\p{Emoji}\s]+$/u.test(text) && text.replace(/\s/g,'').length <= 3;

  const row = document.createElement('div');
  row.className = 'msg-row sent';
  row.innerHTML = `<div class="bubble${isOnlyEmoji ? ' emoji-only' : ''}">${text}<div class="time">${time} <span class="check">✓✓</span></div></div>`;
  messages.insertBefore(row, typingRow);

  input.value = '';
  input.style.height = 'auto';
  messages.scrollTop = messages.scrollHeight;

  // Simulate reply
  setTimeout(() => {
    typingRow.style.display = 'flex';
    messages.scrollTop = messages.scrollHeight;
  }, 800);

  setTimeout(() => {
    typingRow.style.display = 'none';
    const replies = ['✨ Interesante...', '😍 Me encanta!', '🤩 Wow!', '👌 Perfecto', '💛 Genial!', '🙌 Excelente!'];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    const isReplyEmoji = /^[\p{Emoji}\s]+$/u.test(reply) && reply.replace(/\s/g,'').length <= 3;
    const replyTime = new Date().getHours().toString().padStart(2,'0') + ':' + new Date().getMinutes().toString().padStart(2,'0');
    const rRow = document.createElement('div');
    rRow.className = 'msg-row recv';
    rRow.innerHTML = `<div class="bubble${isReplyEmoji ? ' emoji-only' : ''}">${reply}<div class="time">${replyTime}</div></div>`;
    messages.insertBefore(rRow, typingRow);
    messages.scrollTop = messages.scrollHeight;
  }, 2200);
}

sendBtn.onclick = sendMessage;
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
